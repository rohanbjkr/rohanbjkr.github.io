</h2>

<div style="position:relative;padding-bottom:25%;height:0;overflow:hidden;max-width:460px;min-height:215px;margin-bottom:30px;">
  <iframe src="https://www.youtube.com/embed/videoseries?list=PL2AumMHrxZ-AgtCOFu__4H7CAQEw-UmWK"
          frameborder="0"
          allowfullscreen
          style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:4px;">
  </iframe>
</div>

<script>
const feedUrl =
'https://api.rss2json.com/v1/api.json?rss_url=' +
encodeURIComponent(
'https://www.rohanbyanjankar.com.np/feeds/posts/default/-/Econometrics?alt=rss'
);

async function fetchRSS() {
  try {
    const response = await fetch(feedUrl);
    const data = await response.json();

    const container = document.getElementById('recent-econometrics-posts');

    if (data.status !== 'ok') {
      container.innerHTML = '<li>Unable to load articles.</li>';
      return;
    }

    data.items.slice(0,5).forEach(item => {
      const li = document.createElement('li');
      li.style.marginBottom = '8px';

      li.innerHTML =
        '<a href="' + item.link + '" target="_blank">' +
        item.title +
        '</a>';

      container.appendChild(li);
    });

  } catch (error) {
    console.error(error);

    document.getElementById('recent-econometrics-posts').innerHTML =
      '<li>Unable to load articles.</li>';
  }
}

fetchRSS();
</script>
