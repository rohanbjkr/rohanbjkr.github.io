<div style="position:relative;padding-bottom:25%;height:0;overflow:hidden;max-width:460px;min-height:215px;margin-bottom:30px;">
  <iframe src="https://www.youtube.com/embed/videoseries?list=PL2AumMHrxZ-AgtCOFu__4H7CAQEw-UmWK"
          frameborder="0"
          allowfullscreen
          style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:4px;">
  </iframe>
</div>

<script>
    const feedUrl =
'https://api.rss2json.com/v1/api.json?rss_url=' +
encodeURIComponent('https://www.rohanbyanjankar.com.np/feeds/posts/default/-/Econometrics?alt=rss');

    async function fetchRSS() {
      try {
        const response = await fetch(feedUrl);
        const data = await response.json();

        if (data.status === 'ok') {
          const feedContainer = document.getElementById("rss-feed");
          data.items.forEach(item => {
            const listItem = document.createElement("li");
            const anchor = document.createElement("a");
            anchor.href = item.link;
            anchor.textContent = item.title;
            anchor.target = "_blank";

            listItem.appendChild(anchor);
            feedContainer.appendChild(listItem);
          });
        } else {
          console.error("Failed to load feed:", data.message);
        }
      } catch (error) {
        console.error("Error fetching the RSS feed:", error);
      }
    }

    fetchRSS();
  </script>
