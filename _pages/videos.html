<script type="text/javascript">
  // Global callback mapping for the Blogger structural feed API
  function showRecentEconometrics(json) {
    var div = document.getElementById('recent-econometrics-posts');
    if (!div) return;

    if (!json || !json.feed || !json.feed.entry || json.feed.entry.length === 0) {
      div.innerHTML = '<span style="color: #777; font-style: italic;">No recent articles found.</span>';
      return;
    }

    var html = '<ul style="list-style-type: none; padding-left: 0; margin: 0;">';
    var maxEntries = 5;
    var entriesCount = Math.min(json.feed.entry.length, maxEntries);

    for (var i = 0; i < entriesCount; i++) {
      var entry = json.feed.entry[i];
      var title = entry.title.$t;
      var url = '';

      if (entry.link) {
        for (var k = 0; k < entry.link.length; k++) {
          if (entry.link[k].rel === 'alternate') {
            url = entry.link[k].href;
            break;
          }
        }
      }

      html += '<li style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #f0f0f0; display: flex; align-items: baseline;">';
      html += '<span style="color: #888; margin-right: 12px; font-size: 0.85em;">&#9656;</span>';
      html += '<a href="' + url + '" class="recent-post-link" style="text-decoration: none; color: #111; font-weight: 400; transition: color 0.2s ease;">' + title + '</a>';
      html += '</li>';
    }

    html += '</ul>';
    div.innerHTML = html;

    // Inject refined CSS focus/hover behaviors safely
    if (!document.getElementById('recent-posts-hover-style')) {
      var style = document.createElement('style');
      style.id = 'recent-posts-hover-style';
      style.innerHTML = '.recent-post-link:hover { color: #0056b3 !important; text-decoration: underline !important; }';
      document.head.appendChild(style);
    }
  }

  // Safe initiation layer executed upon framework readiness
  document.addEventListener("DOMContentLoaded", function() {
    var script = document.createElement('script');
    script.src = "https://www.rohanbyanjankar.com.np/feeds/posts/default/-/Econometrics?alt=json-in-script&callback=showRecentEconometrics&max-results=5";
    script.type = "text/javascript";
    script.onerror = function() {
      document.getElementById('recent-econometrics-posts').innerHTML = '<span style="color: #c0392b; font-style: italic;">Failed to initialize article feed.</span>';
    };
    document.body.appendChild(script);
  });
</script>
